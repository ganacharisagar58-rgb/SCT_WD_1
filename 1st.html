<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Nexaura | Futuristic SaaS Platform</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&family=Orbitron:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(circle at 20% 30%, #050816, #0a0f1f);
      font-family: 'Inter', sans-serif;
      color: #ffffff;
      overflow-x: hidden;
      scroll-behavior: smooth;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #0b1120;
    }

    ::-webkit-scrollbar-thumb {
      background: #00c6ff;
      border-radius: 10px;
      box-shadow: 0 0 6px #00c6ff;
    }

    .progress-bar {
      position: fixed;
      top: 0;
      left: 0;
      width: 0%;
      height: 4px;
      background: linear-gradient(90deg, #00c6ff, #00f5d4, #8b5cf6);
      z-index: 9999;
      box-shadow: 0 0 12px #00f5d4;
      transition: width 0.08s linear;
    }

    .cursor-glow {
      width: 30px;
      height: 30px;
      background: rgba(0, 198, 255, 0.4);
      border-radius: 50%;
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      filter: blur(8px);
      transition: transform 0.05s linear;
      transform: translate(-50%, -50%);
      opacity: 0.8;
    }

    #particlesCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 32px;
      position: relative;
      z-index: 2;
    }

    .navbar {
      position: sticky;
      top: 20px;
      z-index: 100;
      backdrop-filter: blur(16px);
      background: rgba(5, 8, 22, 0.65);
      border-radius: 80px;
      margin: 20px auto 0;
      width: 90%;
      max-width: 1280px;
      border: 1px solid rgba(0, 198, 255, 0.25);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3), 0 0 12px rgba(0, 198, 255, 0.2);
      transition: all 0.3s;
    }

    .nav-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 32px;
    }

    .logo {
      font-family: 'Orbitron', monospace;
      font-weight: 800;
      font-size: 1.8rem;
      background: linear-gradient(135deg, #00c6ff, #00f5d4);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -1px;
    }

    .nav-links {
      display: flex;
      gap: 32px;
    }

    .nav-links a {
      text-decoration: none;
      color: #e2e8f0;
      font-weight: 500;
      transition: 0.2s;
      position: relative;
    }

    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -6px;
      left: 0;
      width: 0%;
      height: 2px;
      background: linear-gradient(90deg, #00c6ff, #00f5d4);
      transition: 0.3s;
    }

    .nav-links a:hover::after {
      width: 100%;
    }

    .nav-links a:hover {
      color: #00f5d4;
      text-shadow: 0 0 4px #00f5d4;
    }

    .btn-neon {
      background: transparent;
      border: 1px solid #00c6ff;
      padding: 10px 24px;
      border-radius: 40px;
      font-weight: 600;
      color: white;
      cursor: pointer;
      transition: 0.25s;
      box-shadow: 0 0 4px #00c6ff;
    }

    .btn-neon:hover {
      background: #00c6ff20;
      border-color: #00f5d4;
      box-shadow: 0 0 18px #00c6ff;
      transform: scale(1.02);
    }
  </style>
</head>

<body>

<div class="progress-bar" id="progressBar"></div>
<div class="cursor-glow" id="cursorGlow"></div>
<canvas id="particlesCanvas"></canvas>

<script>
  const canvas = document.getElementById('particlesCanvas');
  const ctx = canvas.getContext('2d');

  let particles = [];

  function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  window.addEventListener('resize', resizeCanvas);

  resizeCanvas();

  class Particle {
    constructor() {
      this.x = Math.random() * canvas.width;
      this.y = Math.random() * canvas.height;
      this.radius = Math.random() * 1.8 + 0.5;
      this.speedX = (Math.random() - 0.5) * 0.5;
      this.speedY = (Math.random() - 0.5) * 0.3;
      this.color = `rgba(0, ${Math.random() * 100 + 155}, 255, 0.5)`;
    }

    update() {
      this.x += this.speedX;
      this.y += this.speedY;

      if (this.x < 0) this.x = canvas.width;
      if (this.x > canvas.width) this.x = 0;
      if (this.y < 0) this.y = canvas.height;
      if (this.y > canvas.height) this.y = 0;
    }

    draw() {
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
      ctx.fillStyle = this.color;
      ctx.fill();
    }
  }

  for (let i = 0; i < 180; i++) {
    particles.push(new Particle());
  }

  function animateParticles() {
    if (!ctx) return;

    ctx.clearRect(0, 0, canvas.width, canvas.height);

    particles.forEach(p => {
      p.update();
      p.draw();
    });

    requestAnimationFrame(animateParticles);
  }

  animateParticles();
</script>

</body>
</html>
